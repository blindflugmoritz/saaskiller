name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saaskiller_test
          POSTGRES_USER: saaskiller
          POSTGRES_PASSWORD: saaskiller
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgres://saaskiller:saaskiller@localhost:5432/saaskiller_test
          SECRET_KEY: ci-secret-key
          DEBUG: "True"
          ALLOWED_HOSTS: localhost
          CORS_ALLOWED_ORIGINS: http://localhost:5173
        run: |
          cd backend
          python -m pytest tests/ -v

  test-frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests
        env:
          PUBLIC_API_URL: http://localhost:8000/api
        run: cd frontend && npm test

  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        run: cd backend && pip install -r requirements.txt
      - name: Migrate
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "True"
        run: cd backend && python manage.py migrate
      - name: Install frontend deps + Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium
      - name: Start backend
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "True"
          CORS_ALLOWED_ORIGINS: http://localhost:5173
        run: |
          cd backend
          python manage.py runserver 8000 &
          echo "Waiting for backend..."
          until curl -sf http://localhost:8000/api/health/; do sleep 1; done
      - name: Build frontend
        env:
          PUBLIC_API_URL: http://localhost:8000/api
        run: cd frontend && npm run build
      - name: Start frontend preview
        run: cd frontend && npm run preview -- --port 5173 &
      - name: Run Playwright tests
        run: cd frontend && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
