<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 40px 20px; }
    .container { max-width: 520px; margin: 0 auto; background: #ffffff; border-radius: 8px; padding: 40px; }
    .button { display: inline-block; background: #2563eb; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; margin: 24px 0; }
    .footer { margin-top: 32px; font-size: 13px; color: #6b7280; }
    .link { color: #6b7280; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
    <div class="footer">
      {% if lang == "de" %}
        <p>Falls du diese E-Mail nicht erwartet hast, kannst du sie ignorieren.</p>
      {% else %}
        <p>If you did not expect this email, you can safely ignore it.</p>
      {% endif %}
    </div>
  </div>
</body>
</html>
